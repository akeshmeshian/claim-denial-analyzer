openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Reports
    description: Claim denial report operations.
  - name: Payments
    description: Stripe payment operations.
  - name: Admin
    description: Admin operations.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve a private object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /reports:
    post:
      tags: [Reports]
      operationId: createReport
      summary: Create a new report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportBody'
      responses:
        '201':
          description: Report created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /reports/{id}:
    get:
      tags: [Reports]
      operationId: getReport
      summary: Get a report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /reports/{id}/analyze:
    post:
      tags: [Reports]
      operationId: analyzeReport
      summary: Trigger AI analysis for a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Analysis complete, preview returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeReportResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Analysis failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /reports/{id}/checkout:
    post:
      tags: [Payments]
      operationId: createCheckoutSession
      summary: Create a Stripe Checkout session for a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkout session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /reports/{id}/full:
    get:
      tags: [Reports]
      operationId: getFullReport
      summary: Get the full report (requires paid status)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full report returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullReportResponse'
        '402':
          description: Payment required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /stripe/webhook:
    post:
      tags: [Payments]
      operationId: stripeWebhook
      summary: Stripe webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
  /admin/reports:
    get:
      tags: [Admin]
      operationId: listAdminReports
      summary: List all reports (admin only)
      parameters:
        - name: password
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of reports.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminReportRow'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    CreateReportBody:
      type: object
      required: [email, claimType, claimDescription, denialFileUrl, policyFileUrl]
      properties:
        email:
          type: string
          format: email
        claimType:
          type: string
        claimDescription:
          type: string
        denialFileUrl:
          type: string
        policyFileUrl:
          type: string
    ReportResponse:
      type: object
      required: [id, email, claimType, claimDescription, paymentStatus, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        claimType:
          type: string
        claimDescription:
          type: string
        denialFileUrl:
          type: string
          nullable: true
        policyFileUrl:
          type: string
          nullable: true
        aiPreview:
          type: object
          nullable: true
        paymentStatus:
          type: string
        stripeSessionId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    AnalyzeReportResponse:
      type: object
      required: [reportId, preview]
      properties:
        reportId:
          type: string
        preview:
          type: object
    CheckoutSessionResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
    FullReportResponse:
      type: object
      required: [reportId, paymentStatus, report]
      properties:
        reportId:
          type: string
        paymentStatus:
          type: string
        report:
          type: object
    AdminReportRow:
      type: object
      required: [id, email, claimType, paymentStatus, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        claimType:
          type: string
        paymentStatus:
          type: string
        createdAt:
          type: string
          format: date-time

