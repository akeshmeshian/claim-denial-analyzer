kind = "web"
previewPath = "/"
title = "Claim Denial Analyzer"
version = "1.0.0"
id = "artifacts/claim-denial-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 19740

[services.development]
run = "bash -c 'cd /home/runner/workspace/nextjs && PORT=19740 pnpm dev'"

[services.production.build]
args = ["bash", "-c", "cd /home/runner/workspace/nextjs && pnpm install --ignore-workspace && pnpm build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace/nextjs && pnpm start"]

[services.production.run.env]
PORT = "19740"
NODE_ENV = "production"

[services.env]
PORT = "19740"
