kind = "web"
previewPath = "/"
title = "Claim Denial Analyzer"
version = "1.0.0"
id = "artifacts/claim-denial-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19740

[services.development]
run = "pnpm --filter @workspace/claim-denial-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/claim-denial-analyzer", "run", "build" ]
publicDir = "artifacts/claim-denial-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19740"
BASE_PATH = "/"
